name: publish

# Publishes xlsx-for-ai to npm. Two trigger modes:
#
#   1. workflow_dispatch — fire from any terminal:
#        gh workflow run publish.yml --ref main -f version_bump=none -f dry_run=false
#      Publishes the version main already carries. It does NOT bump, commit, tag or
#      push: this workflow never mutates main.
#
#   2. push of a v* tag — for "tag, then publish":
#      Just publishes whatever's at the tag; no bump.
#
# THE BUMP IS NOT THIS WORKFLOW'S JOB, AND CANNOT BE (XLS-542, 2026-07-16).
# It used to `npm version` + `git push --follow-tags` straight at main. main is a
# PROTECTED branch, so that push is rejected GH006 — and it ran AFTER `npm publish`,
# which is irreversible. Measured result: 3.2.5 went live on npm while main stayed at
# 3.2.4, the tag survived as an orphan, and the MCP Registry served the API-key-
# destroying 3.2.4 for ~42 hours. The publish succeeded; the record of it never landed.
#
# Protection is not the villain — it is why this surfaced, and it stays. An irreversible
# step must never run before a step that can fail. So the bump lands on main FIRST, as a
# reviewed PR through the door, and this workflow publishes what main already carries:
#
#   1. PR the version bump -> land it (main now carries the new version)
#   2. dispatch this workflow with version_bump=none
#
# Setup prereqs (one-time, can't be automated — needs the package owner):
#   - npm: account 2FA = "Authorization only" (not "Authorization and writes")
#   - npm: package MFA = automation (`npm access set mfa=automation xlsx-for-ai`)
#   - npm: granular access token, scope = "Read and Publish" on xlsx-for-ai,
#          type = automation (the "bypass 2FA" checkbox in the UI)
#   - GitHub repo: Secrets and variables → Actions → XLSX_NPM = the granular token
#
# Without ALL of {account-mode, package-mfa, automation-token}, npm will
# reject the publish with EOTP even when the token claims to bypass.

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "MUST be 'none'. Bumping here cannot work: the push to protected main is rejected GH006, and it would run AFTER the irreversible npm publish. Bump via PR first, then dispatch this."
        required: true
        type: choice
        default: none
        options:
          - none
      dry_run:
        description: "Run npm pack + clean-install verification but skip the actual publish."
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read    # this workflow no longer commits or pushes anything. It reads main
                    # and publishes what main carries; the bump arrives as a reviewed PR.
  id-token: write   # for npm provenance (free supply-chain signal)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # FIRST, and before anything irreversible. The rule this enforces is the one the
      # old order broke: a step that CAN fail must never run after a step that CANNOT be
      # undone. `npm publish` cannot be undone; a push to protected main always fails.
      # THE PROPERTY THIS WHOLE FILE CLAIMS, NOW ENFORCED INSTEAD OF ASSERTED.
      # The header says "publishes what main already carries". Nothing checked it: a
      # `workflow_dispatch --ref <any-branch-or-sha>` published THAT ref. npm publish is
      # irreversible, so an accidental dispatch from a feature branch ships code that never
      # landed — the exact class this PR exists to remove, left live in the fix for it.
      # Tag events are exempt by design: they publish the tagged commit, and the tag/version
      # agreement is enforced below.
      - name: Enforce main-only for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::publish.yml must be dispatched against main (got: $GITHUB_REF)."
            echo "This workflow publishes what main carries. Publishing another ref would ship"
            echo "code that never landed — and npm publish cannot be undone."
            echo "  gh workflow run publish.yml --ref main -f version_bump=none -f dry_run=false"
            exit 1
          fi
          echo "Dispatch ref is main."

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history: the release-commit pin guard below runs `git log -1 -- package.json`
          # to find the commit that last set the version, and needs history to walk to it.
          # (I first removed this citing provenance — an invented reason I never measured.
          # The real consumer is the pin guard; this is a measured need.) The `token:` is gone
          # with the push it served.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # BOTH validations run here — after node, BEFORE install/test/pack. A doomed run dies
      # in seconds, not after a full install, and always before anything irreversible.

      # DISPATCH pin (the moving-HEAD hole). "Publish what main carries" is only honest if
      # main's tip IS the release commit. If code lands on main after the bump PR merges, a
      # dispatch would ship those commits under the already-bumped version, un-announced —
      # and npm publish cannot be undone. So refuse unless HEAD is the commit that last set
      # the version. Drift -> tag the intended commit and publish via the tag path instead.
      - name: Pin dispatch to the release commit
        if: github.event_name == 'workflow_dispatch'
        run: |
          LAST_VER_COMMIT="$(git log -1 --format=%H -- package.json)"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ "$LAST_VER_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "::error::main has moved past the release commit."
            echo "HEAD is ${HEAD_COMMIT}, but the last commit to touch package.json is"
            echo "${LAST_VER_COMMIT}. Publishing now would ship commits that landed after the"
            echo "version was set, under that version. Tag ${LAST_VER_COMMIT} and publish via"
            echo "the v* tag path, or land the intended tree as its own versioned release."
            exit 1
          fi
          echo "HEAD is the release commit ${HEAD_COMMIT}."

      # TAG validation: a v* tag publishes the tagged commit; assert the tag NAME matches the
      # version in package.json AT that commit. A mistyped tag (v3.2.6 on a 3.2.5 tree) would
      # ship 3.2.5 under a v3.2.6 tag, or collide with a published version and fail confusingly
      # at the irreversible step.
      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}."
            echo "The tag names one version and the tree carries another; publishing would ship"
            echo "${PKG_VERSION} under a v${TAG_VERSION} tag. Retag the correct commit."
            exit 1
          fi
          echo "Tag v${TAG_VERSION} matches package.json ${PKG_VERSION}."

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --if-present

      - name: Read package metadata
        id: pkg
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $NAME@$VERSION"

      # Normalize dry_run to an unambiguous string output. workflow_dispatch
      # boolean inputs are reported inconsistently across the inputs vs
      # github.event.inputs contexts (string vs real boolean, runner-dependent),
      # so a literal `inputs.dry_run == false` / `== 'false'` compare in an `if:`
      # is fragile either way. Inside a shell step both a boolean and a string
      # render identically, so resolve here once and gate on this output.
      - name: Resolve dry-run flag
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN_INPUT" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard against republishing existing version
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version 2>/dev/null; then
            echo "::notice::Version ${{ steps.pkg.outputs.version }} is already published — skipping pack/install/publish steps."
            echo "ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
          else
            echo "Version ${{ steps.pkg.outputs.version }} not yet published — proceeding."
            echo "ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi

      - name: Pack
        if: env.ALREADY_PUBLISHED != 'true'
        run: npm pack

      - name: Clean-install verification (per feedback_pre_publish_clean_install.md)
        if: env.ALREADY_PUBLISHED != 'true'
        run: |
          set -e
          TARBALL=$(ls ${{ steps.pkg.outputs.name }}-${{ steps.pkg.outputs.version }}.tgz)
          mkdir -p /tmp/clean-install-test
          cd /tmp/clean-install-test
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE/$TARBALL"
          npx --no-install xlsx-for-ai --version
          echo "Clean install verified: tarball installs and CLI runs."

      - name: Publish to npm
        if: env.ALREADY_PUBLISHED != 'true' && steps.flags.outputs.dry_run == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.XLSX_NPM }}

      # Keep the Official MCP Registry listing (io.github.senoff/xlsx-for-ai) in
      # sync on every release. Auth is GitHub Actions OIDC — the id-token:write
      # permission above lets mcp-publisher mint a token for the io.github.senoff/*
      # namespace with no stored secret and no interactive login. server.json's
      # version is force-synced to package.json just before publish so the
      # registry never drifts behind npm. continue-on-error: a registry hiccup
      # (or a same-version re-publish rejection) must never fail the npm release.
      - name: Sync server.json version to package.json
        if: steps.flags.outputs.dry_run == 'false'
        run: |
          node -e "const fs=require('fs');const pkg=require('./package.json');const s=JSON.parse(fs.readFileSync('server.json','utf8'));s.version=pkg.version;s.packages[0].version=pkg.version;fs.writeFileSync('server.json',JSON.stringify(s,null,2)+'\n');"
          echo "server.json synced to $(node -p "require('./package.json').version")"

      - name: Publish to MCP Registry (OIDC)
        if: steps.flags.outputs.dry_run == 'false'
        continue-on-error: true
        env:
          # Pinned to a released tag + SRI hash so a republished or
          # tampered binary fails closed — same integrity-pinning contract
          # the lockfile/signed-install gates apply to the dep tree, now
          # extended to the publish-path binary fetch. Bump both together.
          MCP_PUBLISHER_TAG: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 --max-time 60 -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_TAG}/mcp-publisher_linux_amd64.tar.gz"
          echo "Verifying mcp-publisher ${MCP_PUBLISHER_TAG} against pinned SHA-256..."
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          publish_ok=false
          for attempt in 1 2 3; do
            if timeout 60s ./mcp-publisher login github-oidc && timeout 60s ./mcp-publisher publish; then
              publish_ok=true
              echo "mcp-publisher publish succeeded (attempt $attempt)"
              break
            fi
            echo "mcp-publisher attempt $attempt failed." >&2
            [ "$attempt" -lt 3 ] && sleep $((attempt * 2))
          done
          if [ "$publish_ok" != true ]; then
            echo "::warning::mcp-publisher failed after 3 attempts (registry sync skipped; npm publish unaffected)"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Publish summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "- **Bump:** ${{ inputs.version_bump }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Dry run:** ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          fi
