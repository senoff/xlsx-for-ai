name: Publish to MCP Registry

# Submits server.json to the MCP Registry. Two trigger modes:
#   1. push of a v* tag (e.g. v2.0.0) — automatic on every release
#   2. workflow_dispatch — manual trigger from CLI or GitHub UI for the
#      one-off case where a tag was already pushed before the workflow existed
#
# Auth: GitHub OIDC (no PAT, no device flow). The MCP Registry verifies that
# the OIDC token's repo claim matches the `name` field in server.json
# (must start with "io.github.senoff/" — see d08a2e1 commit message).
#
# The npm package itself is published by .github/workflows/publish.yml.
# This workflow ONLY publishes the server.json metadata.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  id-token: write   # required for GitHub OIDC
  contents: read

jobs:
  publish:
    name: mcp-publisher publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        # Pinned to a specific upstream release + sha256. Without the pin a
        # maintainer takeover or release-artifact substitution upstream could
        # ship a trojaned binary into this runner, which holds an `id-token:
        # write` OIDC token scoped to the `io.github.senoff/xlsx-for-ai` MCP
        # Registry name. To bump: pick the new upstream release tag and copy
        # the `mcp-publisher_linux_amd64.tar.gz` checksum from that release's
        # `registry_<ver>_checksums.txt`. The version + sha256 pair below
        # assumes the linux_amd64 asset; if you change runs-on to a different
        # OS or arch, swap in the matching asset and its checksum.
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          if [ "$(uname -s)" != "Linux" ] || [ "$(uname -m)" != "x86_64" ]; then
            echo "This step is pinned to linux_amd64; current runner is $(uname -s)/$(uname -m)." >&2
            echo "Update MCP_PUBLISHER_SHA256 to the matching asset checksum before changing runs-on." >&2
            exit 1
          fi
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT
          curl -fL --retry 3 --retry-delay 2 --max-time 120 \
            -o "$TMP/mcp-publisher.tar.gz" \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          printf '%s  %s\n' "$MCP_PUBLISHER_SHA256" "$TMP/mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f "$TMP/mcp-publisher.tar.gz" -C "$TMP"
          BIN="$(find "$TMP" -type f -name mcp-publisher -print -quit)"
          if [ -z "$BIN" ]; then
            echo "mcp-publisher binary not found in tarball" >&2
            exit 1
          fi
          mv "$BIN" ./mcp-publisher
          chmod +x ./mcp-publisher
          ./mcp-publisher --help | head -5

      - name: Sync server.json version to package.json
        run: |
          # Authoritative version source: package.json (which publish.yml bumps
          # and pushes). On tag-push events GITHUB_REF is the tag (we could
          # parse it instead), but using package.json works uniformly for both
          # push events AND workflow_dispatch reruns from any ref. This is
          # what unblocked the 'cannot publish duplicate version' bug we hit
          # when re-running on a tag where the repo's server.json was still
          # at the old version.
          VERSION=$(jq -r '.version' package.json)
          echo "Sync version: ${VERSION}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' \
            server.json > server.tmp && mv server.tmp server.json
          cat server.json

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
