name: grace-review

on:
  pull_request:
    # Fire only when the PR is at a reviewable boundary, NOT on every commit:
    #  - opened (non-draft): PR is born ready
    #  - ready_for_review: draft → ready transition (the feature-commits-inside
    #    workflow we use opens drafts, shapes through many commits, then marks
    #    ready when done; this fires once at that moment)
    #  - reopened: re-fire if a closed PR comes back
    # Synchronize (every push) intentionally OMITTED to avoid token burn on
    # mid-feature commits. Bob 2026-05-19: feature-PR-with-many-commits-inside
    # means we'd run Grace 5-15 times per PR otherwise.
    types: [opened, ready_for_review, reopened]

# Run only one instance per PR.
concurrency:
  group: grace-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Multi-LLM diff defect review
    # Skip draft PRs (the "opened" trigger fires on draft creation; ready_for_review
    # is the one we actually want for draft→ready transitions). Also skip forks
    # since secrets (GRACE_DEPLOY_TOKEN, ANTHROPIC/OPENAI/GEMINI_API_KEY) aren't
    # exposed to fork-based PRs and the job would fail noisily.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # to post the comment
    timeout-minutes: 15
    steps:
      - name: Checkout PR (with full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Clone senoff/grace + senoff/max + multi-review tool
        env:
          GRACE_DEPLOY_TOKEN: ${{ secrets.GRACE_DEPLOY_TOKEN }}
          # Pinned to specific SHAs (not branch HEAD) so a force-push or
          # malicious commit to senoff/grace or senoff/max can't immediately
          # execute in CI with our secrets. Bump these intentionally when
          # upstream changes warrant.
          GRACE_SHA: 4892e932ceea59f364836100d0c00e83751a17f7
          MAX_SHA:   9c42b002557b8e5755a29e588a73979b3857ccb5
        run: |
          set -e
          git clone "https://x-access-token:${GRACE_DEPLOY_TOKEN}@github.com/senoff/grace.git" "$HOME/grace"
          git -C "$HOME/grace" checkout "$GRACE_SHA"
          git clone "https://x-access-token:${GRACE_DEPLOY_TOKEN}@github.com/senoff/max.git" "$HOME/max"
          git -C "$HOME/max" checkout "$MAX_SHA"
          # multi-review + llm-review live in Bob's ~/bin and grace-review
          # hardcodes "$HOME/bin/llm-review" (doesn't go through PATH). Vendor
          # both into $HOME/bin so the script's hardcoded paths work.
          mkdir -p "$HOME/bin"
          for tool in multi-review llm-review; do
            if [ -f "$HOME/grace/bin/$tool" ]; then
              cp "$HOME/grace/bin/$tool" "$HOME/bin/$tool"
              chmod +x "$HOME/bin/$tool"
            else
              echo "::warning::$tool not vendored in senoff/grace — review will likely fail"
            fi
          done
          echo "$HOME/bin" >> "$GITHUB_PATH"
          echo "$HOME/grace/bin" >> "$GITHUB_PATH"

      - name: Set up Python (for grace-review's LLM calls)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          set -e
          # multi-review uses curl + jq + python's json/urllib — all standard
          # If grace-review or multi-review uses anything else, add here.
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          # Fail-fast on pip install errors — silent suppression masked failures
          # and produced opaque downstream errors. If a provider is genuinely
          # unavailable, the workflow should fail visibly so it's fixed.
          pip install --quiet anthropic openai google-generativeai

      - name: Compute diff (PR base...head)
        id: diff
        run: |
          set -e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Fetch the exact base SHA — depth=1 of the base branch tip can miss
          # BASE_SHA if the base branch advanced between event creation and the
          # fetch, producing "fatal: bad object" diff errors.
          git fetch --no-tags origin "$BASE_SHA"
          # Three-dot diff = "changes on PR branch since divergence" (the GitHub PR view)
          git diff "${BASE_SHA}...${HEAD_SHA}" > /tmp/pr.diff
          echo "diff_lines=$(wc -l < /tmp/pr.diff | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "Diff is $(wc -l < /tmp/pr.diff) lines"

      - name: Run grace-review on the diff
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          OUT_DIR="$HOME/grace-out"
          mkdir -p "$OUT_DIR"
          # Pipe the diff in via stdin; tag context with the PR number.
          # Don't use --pr/--post here — we read comment.md and post via the
          # next step using the action's GITHUB_TOKEN (so the comment author is
          # github-actions[bot] rather than the deploy-token user).
          cat /tmp/pr.diff | bash "$HOME/grace/bin/grace-review" \
            -p diff-defect \
            -c "PR #${PR_NUM}" \
            -o "$OUT_DIR" \
            || REVIEW_EXIT=$?
          echo "grace-review exit: ${REVIEW_EXIT:-0}"
          # Don't fail the job here; we want the comment posted even if grace
          # found CRITICAL/HIGH (that's the whole point). Fail-check happens below.
          ls -la "$OUT_DIR"

      - name: Post comment.md to the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          COMMENT_FILE="$HOME/grace-out/comment.md"
          if [ ! -s "$COMMENT_FILE" ]; then
            echo "::warning::no comment.md from grace-review — skipping post"
            exit 0
          fi
          # Prefix the comment with a clear "Grace review (auto)" header so
          # human reviewers know it's a CI-posted multi-LLM review.
          {
            echo "## 🤖 Grace review (multi-LLM, auto)"
            echo ""
            cat "$COMMENT_FILE"
            echo ""
            echo "---"
            echo "_Posted automatically by \`.github/workflows/grace-review.yml\`. See [senoff/grace](https://github.com/senoff/grace) for the doctrine._"
          } > /tmp/comment-with-header.md
          gh pr comment "$PR_NUM" --repo "$REPO" --body-file /tmp/comment-with-header.md

      - name: Fail the check if HIGH or CRITICAL findings
        env:
          # gh pr view (below) needs an authenticated token to read the PR
          # description for the grace-override: escape hatch. Without this,
          # gh is unauthenticated, DESC ends up empty, and the override path
          # silently never fires.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          COMMENT_FILE="$HOME/grace-out/comment.md"
          if [ ! -s "$COMMENT_FILE" ]; then
            echo "no comment.md — failing closed"
            exit 1
          fi
          if grep -qE "^##\s+CRITICAL|^### CRITICAL|^- \[CRITICAL\]" "$COMMENT_FILE"; then
            echo "::error::Grace found CRITICAL findings in the diff. See PR comment for details."
            exit 1
          fi
          if grep -qE "^##\s+HIGH|^### HIGH|^- \[HIGH\]" "$COMMENT_FILE"; then
            echo "::error::Grace found HIGH-severity findings in the diff. Address them, or override by editing the PR description with 'grace-override: <reason>'."
            # Honor an override line in the PR description for borderline cases.
            DESC=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json body --jq '.body' 2>/dev/null || echo "")
            if echo "$DESC" | grep -qE "grace-override:"; then
              echo "::warning::HIGH findings present BUT 'grace-override:' line found in PR description — passing the check."
              exit 0
            fi
            exit 1
          fi
          echo "Grace review clean (no HIGH/CRITICAL). Check passed."
