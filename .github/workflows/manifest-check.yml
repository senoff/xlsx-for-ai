name: manifest-check

# Fails when manifest.json drifts from the single source of truth
# (mcp.js TOOLS + lib/annotations.js). Catches the class of bug
# F3 surfaced during the connector-submissions build:
# xlsx_data_clean was in TOOLS but missing from manifest.json
# because the manifest was hand-maintained.
#
# Mirrors the local Husky pre-commit hook so a forced-no-verify
# push or a non-Claude commit can't bypass the gate.

on:
  pull_request:
    branches:
      - main
    paths:
      - "mcp.js"
      - "lib/annotations.js"
      - "manifest.json"
      - "scripts/build-manifests.js"
  push:
    branches:
      - main
    paths:
      - "mcp.js"
      - "lib/annotations.js"
      - "manifest.json"
      - "scripts/build-manifests.js"

permissions:
  contents: read

jobs:
  check:
    name: manifests in sync with TOOLS array
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run --check
        run: node scripts/build-manifests.js --check
